# =============================================
# CareerPilot AI - Production Configuration
# =============================================
# This is deployed to Railway and uses environment variables
# All sensitive values come from Railway dashboard

# Server - Railway provides dynamic PORT
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# =============================================
# Database - Railway MySQL
# =============================================
# Railway provides MYSQL_URL in format:
# mysql://user:password@host:port/database
# We convert it to JDBC format via Spring's driver

spring.datasource.url=${MYSQL_PRIVATE_URL:jdbc:mysql://localhost:3306/careerpilot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool - production tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# JWT Configuration
# =============================================
# CRITICAL: Change secret in production
app.jwt.secret=${JWT_SECRET:Y2FyZWVycGlsb3RhaXNlY3JldGtleWZvcmp3dGF1dGhlbnRpY2F0aW9uMjAyNHZlcnkgc2VjdXJlIGtleQ==}
app.jwt.expiration-ms=86400000

# =============================================
# CORS - Production URLs
# =============================================
# Railway frontend URL will be injected here
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://careerpilot.railway.app,https://careerpilot-frontend.railway.app}

# =============================================
# Logging - Minimal in production
# =============================================
logging.level.root=INFO
logging.level.com.careerpilot=INFO
logging.level.com.careerpilot.ai=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================
# File Upload - Production
# =============================================
# Use Railway's ephemeral filesystem (reset on deploy)
# OR configure cloud storage (optional upgrade)
app.upload.dir=uploads/resumes
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# =============================================
# Google Gemini Configuration (PRIMARY)
# =============================================
gemini.api-key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
gemini.model=gemini-2.0-flash
gemini.base-url=https://generativelanguage.googleapis.com
gemini.api-version=v1beta
gemini.connect-timeout-ms=10000
gemini.read-timeout-ms=60000
gemini.max-output-tokens=2048
gemini.temperature=0.7
gemini.max-retries=2
gemini.retry-delay-ms=1000
gemini.enabled=true

# =============================================
# Groq Configuration (FALLBACK)
# =============================================
groq.api-key=${GROQ_API_KEY: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}
groq.model=llama-3.3-70b-versatile
groq.base-url=https://api.groq.com/openai/v1
groq.connect-timeout-ms=10000
groq.read-timeout-ms=60000
groq.max-output-tokens=1024
groq.temperature=0.7
groq.max-retries=2
groq.retry-delay-ms=1000
groq.enabled=true

# =============================================
# AI Provider Failover
# =============================================
ai.fallback.enabled=true
ai.fallback.provider-order=GEMINI,GROQ
ai.fallback.retry-on-rate-limit=true
ai.fallback.check-provider-health=true
